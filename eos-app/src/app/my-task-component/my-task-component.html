<div class="task-dashboard">
  
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="dashboard-title mb-0">My Tasks</h2>
    <button class="btn btn-primary" (click)="openTaskModal()">Add Task</button>
  </div>

  <div class="task-grid">
    @for (task of tasks(); track task.taskId) {
      <div class="task-card">
        
        <div class="task-header">
          <h3 class="task-title">{{task.name}}</h3>
          <span class="status-badge">
            {{ getStatusName(task.statusTypeId) }}
          </span>
        </div>

        <div class="task-body">
          <div class="detail-row">
            <span class="detail-label">Due Date</span>
            <span class="detail-value date">{{task.dueDate}}</span>
          </div>
          
          <div class="detail-row">
            <span class="detail-label">Created By</span>
            <span class="detail-value assignee">{{task.createdByFullName}}</span>
          </div>
        </div>

        <div class="d-flex justify-content-end mt-4 gap-2">
          <button class="btn btn-danger btn-sm" (click)="deleteTask(task.taskId)">Delete</button>
          
          <button class="btn btn-outline-primary btn-sm" (click)="openTaskModal(task)">Edit</button>
        </div>

      </div>
    }
  </div>
</div>
